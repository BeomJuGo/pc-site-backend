name: Price Alert Check

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"  # Every 6 hours
  workflow_dispatch:

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger price alert check
        shell: bash
        run: |
          set -e
          echo "POST ${{ secrets.BACKEND_URL }}/api/admin/check-price-alerts"

          for i in 1 2 3; do
            echo "Attempt $i..."
            http_code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
              -X POST "${{ secrets.BACKEND_URL }}/api/admin/check-price-alerts" \
              -H "Authorization: Bearer ${{ secrets.ADMIN_API_KEY }}") || true

            echo "HTTP $http_code"
            cat /tmp/resp.txt || true

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "✅ Alert check triggered"
              exit 0
            fi

            echo "⚠️ Failed (HTTP $http_code). Retrying in 10s..."
            sleep 10
          done

          echo "❌ All retries failed"
          exit 1
