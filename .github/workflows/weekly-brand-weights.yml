name: Weekly Brand Weights Update

on:
  schedule:
    - cron: "0 16 * * 1"   # 매주 월요일 KST 01:00 (UTC 16:00)
  workflow_dispatch:

jobs:
  update-brand-weights:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: weekly-brand-weights
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Update brand popularity weights
        run: node scripts/update-brand-weights.js
        working-directory: backend
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      - name: Update popularity scores
        run: node scripts/update-popularity-scores.js
        working-directory: backend
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[워크플로우 실패] ${context.workflow}`,
              body: `실행 링크: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug']
            })
