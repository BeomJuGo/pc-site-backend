name: Weekly Brand Weights Update

on:
  schedule:
    - cron: "0 16 * * 1"   # 매주 월요일 KST 01:00 (UTC 16:00)
  workflow_dispatch:

jobs:
  update-brand-weights:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Update brand popularity weights
        run: node scripts/update-brand-weights.js
        working-directory: backend
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      - name: Update popularity scores
        run: node scripts/update-popularity-scores.js
        working-directory: backend
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
