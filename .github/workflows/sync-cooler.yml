name: Monthly Cooler Sync

on:
  schedule:
    - cron: "0 20 1 * *"  # 05:00 KST on 1st of each month
  workflow_dispatch:

jobs:
  sync-cooler:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: sync-cooler
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run Cooler sync
        run: node scripts/sync-cooler.js
        working-directory: backend
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PAGES: "3"
          AI: "true"
