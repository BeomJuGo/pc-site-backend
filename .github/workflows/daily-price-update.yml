name: Daily Price Update

on:
  schedule:
    - cron: "0 15 * * *"   # 매일 KST 자정 (UTC 15:00)
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: daily-price-update
      cancel-in-progress: false

    env:
      BACKEND_URL: https://pc-site-backend.onrender.com
      API_PATH: /api/admin/update-all-prices

    steps:
      - name: Update all part prices via Naver Shopping API
        shell: bash
        run: |
          set -e
          echo "POST $BACKEND_URL$API_PATH"

          for i in 1 2 3; do
            echo "Attempt $i..."
            http_code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
              -X POST "$BACKEND_URL$API_PATH" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.ADMIN_API_KEY }}") || true

            echo "HTTP $http_code"
            cat /tmp/resp.txt || true

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "✅ Price update triggered successfully"
              exit 0
            fi

            echo "⚠️ Failed (HTTP $http_code). Retrying in 20s..."
            sleep 20
          done

          echo "❌ All retries failed"
          exit 1
