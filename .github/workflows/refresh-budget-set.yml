name: Weekly Budget Set Refresh

on:
  schedule:
    - cron: "0 20 * * 1"  # 매주 월요일 20:00 UTC
  workflow_dispatch:

jobs:
  refresh-budget-set:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: refresh-budget-set
      cancel-in-progress: false

    env:
      BACKEND_URL: https://pc-site-backend.onrender.com

    steps:
      - name: Refresh all AI budget sets
        shell: bash
        run: |
          set -e
          echo "POST $BACKEND_URL/api/recommend/budget-set/refresh-all"

          http_code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            -X POST "$BACKEND_URL/api/recommend/budget-set/refresh-all" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_API_KEY }}" \
            --max-time 30) || true

          echo "HTTP $http_code"
          cat /tmp/resp.txt || true

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ refresh-all started successfully (runs in background)"
            exit 0
          fi

          echo "❌ Failed (HTTP $http_code)"
          exit 1
