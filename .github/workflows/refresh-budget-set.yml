name: Weekly Budget Set Refresh

on:
  schedule:
    - cron: "0 20 * * 1"  # 매주 월요일 20:00 UTC
  workflow_dispatch:

jobs:
  refresh-budget-set:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: refresh-budget-set
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Refresh all AI budget sets
        run: node scripts/refresh-budget-sets.js
        working-directory: backend
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
